<header class="w-full sticky top-0 z-50 bg-background/95 backdrop-blur-xl border-b border-outline-variant/40 shadow-[0_2px_24px_rgba(12,35,64,0.06)]">
  <!-- Prestige accent stripe -->
  <div class="h-[3px] w-full bg-smarp-teal"></div>

  <div class="max-w-[1440px] mx-auto px-6 lg:px-8 flex items-center justify-between h-[68px]">

    <!-- Brand -->
    <a routerLink="/" (click)="closeMenu()" class="flex flex-col leading-none group focus-ring-none focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-smarp-teal/60 rounded-sm">
      <span class="text-xl font-black tracking-tight text-smarp-navy font-headline group-hover:text-primary transition-colors duration-200">SMARP</span>
      <span class="text-[11px] font-semibold tracking-[0.18em] text-on-surface-variant uppercase mt-0.5">Anesthésie · Réanimation</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex items-center gap-7" aria-label="Navigation principale">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="text-smarp-navy font-semibold"
          [routerLinkActiveOptions]="{ exact: !!link.exact }"
          class="text-sm text-on-surface-variant font-medium hover:text-smarp-navy transition-colors duration-200 relative py-1
                 focus-ring-none focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-smarp-teal/50 rounded-sm
                 after:absolute after:bottom-0 after:left-0 after:right-0 after:h-[2px] after:bg-smarp-teal
                 after:scale-x-0 after:origin-left after:transition-transform after:duration-250 after:ease-out
                 hover:after:scale-x-100 [&.active-link]:after:scale-x-100"
          (click)="closeMenu()"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <!-- Doctolib CTA — pill shape for distinction -->
    <a
      href="https://www.doctolib.fr/clinique-privee/saint-etienne/anesthesistes-de-l-hopital-prive-de-la-loire"
      target="_blank"
      rel="noopener noreferrer"
      class="hidden md:inline-flex items-center gap-2 text-white px-5 py-2.5 rounded-full text-sm font-semibold
             hover:brightness-110 active:scale-[0.97] transition-[filter,transform,box-shadow] duration-200
             shadow-sm hover:shadow-[0_4px_16px_rgba(5,150,222,0.35)]
             focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#0596DE] focus-visible:ring-offset-2"
      style="background-color: #0596DE;"
      aria-label="Prendre rendez-vous sur Doctolib — ouvre un nouvel onglet"
    >
      <span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
      Prendre rendez-vous
    </a>

    <!-- Mobile Burger -->
    <button
      class="md:hidden flex flex-col gap-[5px] w-10 h-10 items-center justify-center rounded-lg hover:bg-surface-container-low
             active:bg-surface-container transition-colors focus-ring-none focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-smarp-teal/50"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Menu"
    >
      <!-- The three bars animate into an × — each bar uses independent transforms -->
      <span class="block w-5 h-[2px] bg-smarp-navy rounded transition-[transform,opacity] duration-300"
            [class.rotate-45]="isMenuOpen()" [class.translate-y-[7px]]="isMenuOpen()"></span>
      <span class="block w-5 h-[2px] bg-smarp-navy rounded transition-[transform,opacity] duration-300"
            [class.opacity-0]="isMenuOpen()" [class.scale-x-0]="isMenuOpen()"></span>
      <span class="block w-5 h-[2px] bg-smarp-navy rounded transition-[transform,opacity] duration-300"
            [class.-rotate-45]="isMenuOpen()" [class.-translate-y-[7px]]="isMenuOpen()"></span>
    </button>
  </div>

  <!-- Mobile Menu — .mobile-menu-enter drives the slide-in from styles.scss -->
  @if (isMenuOpen()) {
    <div class="mobile-menu-enter md:hidden border-t border-outline-variant/40 bg-background px-6 py-5 flex flex-col gap-4">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="text-primary font-semibold"
          [routerLinkActiveOptions]="{ exact: !!link.exact }"
          class="text-base text-on-surface font-medium py-1 border-b border-outline-variant/30 pb-3
                 hover:text-smarp-navy focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-smarp-teal/40 rounded-sm"
          (click)="closeMenu()"
        >
          {{ link.label }}
        </a>
      }
      <a
        href="https://www.doctolib.fr/clinique-privee/saint-etienne/anesthesistes-de-l-hopital-prive-de-la-loire"
        target="_blank"
        rel="noopener noreferrer"
        class="mt-2 inline-flex items-center gap-2 text-white px-5 py-3 rounded-full font-semibold text-sm justify-center
               active:scale-[0.97] transition-[filter,transform] duration-150
               focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#0596DE] focus-visible:ring-offset-2"
        style="background-color: #0596DE;"
        (click)="closeMenu()"
        aria-label="Prendre rendez-vous sur Doctolib — ouvre un nouvel onglet"
      >
        <span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
        Prendre rendez-vous
      </a>
    </div>
  }
</header>
